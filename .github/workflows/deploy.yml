name: Deploy to Wasmer Edge

on:
  push:
    branches:
      - main # Triggers the deploy whenever you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. This installs the Wasmer CLI onto the GitHub runner environment
      - name: Setup Wasmer CLI
        uses: wasmerio/setup-wasmer@v3.1

      # 2. This authenticates and executes the cloud build/deploy 
      - name: Deploy to Wasmer Edge
        run: wasmer deploy --token=${{ secrets.WASMER_TOKEN }}

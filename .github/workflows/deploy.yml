name: Deploy to Wasmer Edge

on:
  push:
    branches:
      - main # Triggers the deploy whenever you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Wasmer
        uses: wasmerio/wasmer-deploy-action@v1
        with:
          wasmer-token: ${{ secrets.WASMER_TOKEN }}
